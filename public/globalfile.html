    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }

        .pointer-all {
            pointer-events: all;
        }

        .country-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .country-card:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: #38bdf8;
            transform: translateY(-2px);
        }

        /* Modal Styles */
        #message-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        #message-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>

        const GLOBE_RADIUS = 100;

        window.onload = function () {
            init();
            animate();
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 350;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(5, 3, 5);
            scene.add(sun);

            const loader = new THREE.TextureLoader();
            const earthTexture = loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
            const bumpTexture = loader.load('https://unpkg.com/three-globe/example/img/earth-topology.png');

            const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
            const globeMaterial = new THREE.MeshPhongMaterial({
                map: earthTexture,
                bumpMap: bumpTexture,
                bumpScale: 2,
                shininess: 5
            });

            globe = new THREE.Mesh(globeGeometry, globeMaterial);
            scene.add(globe);

            Object.keys(countryData).forEach(key => {
                const data = countryData[key];
                addMarker(data.lat, data.lon, data.color, key);
            });

            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ color: 0xc0c8e0, size: 0.6 });
            const starVertices = [];
            for (let i = 0; i < 4000; i++) {
                starVertices.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            setupInteraction();
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function addMarker(lat, lon, color, label) {
            const pos = latLonToVector3(lat, lon, GLOBE_RADIUS);
            const markerGeo = new THREE.SphereGeometry(1.5, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: color });
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.copy(pos);

            const ringGeo = new THREE.RingGeometry(2, 2.5, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.copy(pos);
            ring.lookAt(new THREE.Vector3(0, 0, 0));

            globe.add(marker);
            globe.add(ring);
        }

        function flyToCountry(name) {
            const data = countryData[name];
            if (!data) return;

            closeModal(); // Hide any existing modal
            isFlying = true;

            const destPos = latLonToVector3(data.lat, data.lon, GLOBE_RADIUS);
            const targetVec = destPos.clone().normalize();
            const cameraVec = new THREE.Vector3(0, 0, 1);

            const quaternion = new THREE.Quaternion().setFromUnitVectors(targetVec, cameraVec);
            targetQuaternion.copy(quaternion);

            rotationSpeed = 0;

            // Zoom in
            const zoomIn = setInterval(() => {
                if (camera.position.z > 200) camera.position.z -= 4;
                else clearInterval(zoomIn);
            }, 16);

            // Wait for animation to finish, then show modal
            setTimeout(() => {
                isFlying = false;
                rotationSpeed = 0.0003;
                openModal(name, data);
            }, 2000);
        }

        function openModal(name, data) {
            const modal = document.getElementById('message-modal');
            document.getElementById('modal-title').innerText = `${data.avatar}  ${name}`;
            document.getElementById('modal-question').innerText = data.question;
            document.getElementById('modal-body').innerText = data.message;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('message-modal').classList.remove('active');
        }

        function handleLike(btn) {
            const count = btn.querySelector('.like-count');
            const liked = btn.classList.toggle('text-rose-400');
            btn.classList.toggle('text-slate-400', !liked);
            count.innerText = liked ? parseInt(count.innerText) + 1 : Math.max(0, parseInt(count.innerText) - 1);
        }

        function handleComment() {
            // placeholder for comment action
        }

        function handleShare() {
            if (navigator.share) {
                navigator.share({ title: document.getElementById('modal-title').innerText, text: document.getElementById('modal-body').innerText });
            } else {
                navigator.clipboard.writeText(document.getElementById('modal-body').innerText);
            }
        }

        function resetGlobe() {
            closeModal();
            isFlying = true;
            rotationSpeed = 0;

            // Animate camera back to default zoom
            const zoomTarget = 350;
            const zoomStep = () => {
                if (!camera) return;
                camera.position.z += (zoomTarget - camera.position.z) * 0.08;
                if (Math.abs(camera.position.z - zoomTarget) > 1) {
                    requestAnimationFrame(zoomStep);
                } else {
                    camera.position.z = zoomTarget;
                }
            };
            zoomStep();

            // Smoothly slerp globe back to identity quaternion
            const identity = new THREE.Quaternion();
            targetQuaternion.copy(identity);

            setTimeout(() => {
                isFlying = false;
                rotationSpeed = 0.0015;
            }, 1200);
        }

        function setupInteraction() {
            const container = document.getElementById('canvas-container');
            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
                closeModal();
            });

            window.addEventListener('mousemove', (e) => {
                if (isDragging && !isFlying) {
                    const deltaMove = {
                        x: e.clientX - previousMousePosition.x,
                        y: e.clientY - previousMousePosition.y
                    };
                    globe.rotation.y += deltaMove.x * 0.005;
                    globe.rotation.x += deltaMove.y * 0.005;
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                    rotationSpeed = 0;
                }
            });

            window.addEventListener('mouseup', () => isDragging = false);

            window.addEventListener('wheel', (e) => {
                camera.position.z += e.deltaY * 0.15;
                camera.position.z = Math.max(120, Math.min(camera.position.z, 600));
                closeModal();
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isFlying) {
                globe.quaternion.slerp(targetQuaternion, 0.05);
            } else if (!isDragging) {
                globe.rotation.y += rotationSpeed;
            }
            stars.rotation.y += 0.0001;
            renderer.render(scene, camera);
        }
    </script>
